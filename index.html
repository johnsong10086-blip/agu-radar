UNI = UNI.filter(function(u){ return u.c.match(/^\d{6}$/); });

var SIGS = ["突破20日均线","突破60日均线","MACD金叉","RSI超卖反弹","布林带下轨支撑","放量突破压力位","成交量创近期新高","主力资金净流入","底部W形态确认","价格突破整理区间","KDJ金叉共振","均线多头排列","缩量回调后放量","涨停板撬板信号","龙头股联动效应"];
var CATS = {
  "白酒":["机构密集调研，上调目标价","旺季动销超预期，库存健康","高端化策略见效，毛利率提升","产能扩张计划获批","出口市场实现突破"],
  "新能源":["海外订单大幅增长","新一代产品技术发布","产能利用率持续提升","与车企签署长期协议","政策补贴新政受益"],
  "半导体":["国产替代加速推进","新制程产品良率提升","大客户订单超预期","研发突破关键技术节点","政府专项资金支持"],
  "医药":["新药临床数据积极","医保谈判成功纳入","海外授权合作签署","仿制药一致性评价通过","创新药审评提速"],
  "银行":["资产质量持续改善","零售贷款增速亮眼","中间业务收入增长","不良率降至历史低位","数字化转型成效显现"],
  "家电":["出口订单创历史新高","高端产品占比提升","原材料成本下降改善利润","海外市场加速扩张","以旧换新政策受益"],
  "电池":["固态电池技术突破","新客户订单落地","产能爬坡顺利","海外建厂计划推进","电芯能量密度提升"],
  "金融科技":["用户活跃度创新高","AI功能上线受市场认可","机构客户数量快速增长","数据服务收入大增","监管政策边际放松"],
};
var DEFCAT = ["基本面改善，机构开始建仓","行业景气度回升，订单增加","技术突破带来业绩拐点","管理层增持，释放积极信号","板块联动，资金轮动流入"];

var MMAP = {sh:"沪市",sz:"深市",cyb:"创业板",kcb:"科创板"};
var MCOLOR = {sh:"#3b82f6",sz:"#10b981",cyb:"#f59e0b",kcb:"#8b5cf6"};
var RC = {low:"#10b981",medium:"#f59e0b",high:"#ef4444"};
var RL = {low:"低风险",medium:"中风险",high:"高风险"};
var SENTS = [
  {c:"#ef4444",l:"做多",n:"沪指强势突破，北向资金持续流入，市场情绪高涨"},
  {c:"#ef4444",l:"做多",n:"热点板块轮动活跃，量能充足，个股机会丰富"},
  {c:"#fbbf24",l:"震荡",n:"指数窄幅整理，等待方向选择，结构性机会为主"},
  {c:"#fbbf24",l:"震荡",n:"市场分化明显，资金抱团龙头，精选个股为主"},
  {c:"#94a3b8",l:"谨慎",n:"量能萎缩，市场观望情绪浓，注意控制仓位"},
];

var allStocks=[], curFilter="all", curSort="signal", batch=0;
var URLS=[];

function rng(seed){ var s=seed; return function(){ s=(s*16807)%2147483647; return (s-1)/2147483646; }; }

function generate(offset) {
  var d=new Date();
  var seed=d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate()+offset*113;
  var r=rng(seed);
  var pool = curFilter==="all" ? UNI : UNI.filter(function(u){return u.m===curFilter;});
  if(pool.length<10) pool=UNI;
  var arr=pool.slice().sort(function(){return r()-0.5;}).slice(0,10);
  var sent=SENTS[Math.floor(r()*SENTS.length)];
  var stocks=arr.map(function(u){
    var chg=(r()*9+0.5)*(r()>0.25?1:-1);
    var basePrice = u.m==="sh"&&u.c==="600519"?1700 : u.m==="cyb"&&u.c==="300750"?180 : r()*150+5;
    var price=Math.round(basePrice*(1+(r()-0.5)*0.15)*100)/100;
    var vol=r()*6+1.2;
    var sig=Math.floor(r()*4+6);
    // boost signal if positive change
    if(chg>3) sig=Math.min(10,sig+1);
    var sigArr=SIGS.slice().sort(function(){return r()-0.5;}).slice(0,3);
    var cats=CATS[u.s]||DEFCAT;
    var cat=cats[Math.floor(r()*cats.length)];
    var up=r()*0.2+0.08, dn=r()*0.08+0.04;
    return {
      code:u.c, name:u.n, sector:u.s, market:u.m,
      price:price, chg:Math.round(chg*10)/10,
      vol:Math.round(vol*10)/10, sig:sig,
      signals:sigArr, cat:cat,
      tp:Math.round(price*(1+up)*100)/100,
      sl:Math.round(price*(1-dn)*100)/100,
      risk:u.r
    };
  }).sort(function(a,b){return b.sig-a.sig;});
  return {date:d.toISOString().split("T")[0], sent:sent, stocks:stocks};
}

function thsUrl(code) {
  return "https://stockpage.10jqka.com.cn/"+code;
}

function renderCards(){
  var stocks=allStocks.filter(function(s){
    if(curFilter==="all") return true;
    return s.market===curFilter;
  });
  stocks.sort(function(a,b){
    if(curSort==="signal") return b.sig-a.sig;
    if(curSort==="change") return b.chg-a.chg;
    if(curSort==="volume") return b.vol-a.vol;
    return 0;
  });
  URLS=[];
  var html="";
  for(var i=0;i<stocks.length;i++){
    var s=stocks[i];
    var mc=MCOLOR[s.market]||"#94a3b8";
    var rc=RC[s.risk];
    var isUp=s.chg>=0;
    URLS.push(thsUrl(s.code));
    var bars="";
    for(var b=0;b<10;b++){
      var ht=b<5?12:18;
      var bg=b<s.sig?"hsl("+(s.chg>=0?0:220)+",80%,"+(50+b*2)+"%)":"rgba(255,255,255,0.1)";
      if(s.chg>=0 && b<s.sig) bg="hsl(0,75%,"+(55-b*2)+"%)";
      bars+='<div class="sigbar" style="height:'+ht+'px;background:'+bg+'"></div>';
    }
    var tags=s.signals.map(function(x){return '<span class="sigtag">📊 '+x+'</span>';}).join("");
    html+='<div class="card" id="c'+i+'" style="border-left:3px solid '+mc+'" onclick="tog('+i+')">'
      +'<div style="position:absolute;top:0;right:0;width:120px;height:120px;border-radius:50%;transform:translate(40%,-40%);background:radial-gradient(circle,'+mc+'20 0%,transparent 70%);pointer-events:none"></div>'
      +'<div class="card-top">'
        +'<div>'
          +'<div style="display:flex;align-items:center;gap:6px">'
            +'<span class="code">'+s.code+'</span>'
            +'<span class="sbadge" style="background:'+mc+'22;color:'+mc+'">'+MMAP[s.market]+'</span>'
            +'<span class="sbadge" style="background:rgba(255,255,255,0.06);color:#94a3b8">'+s.sector+'</span>'
          +'</div>'
          +'<div class="coname">'+s.name+'</div>'
        +'</div>'
        +'<div class="pricecol">'
          +'<div class="price">¥'+s.price.toFixed(2)+'</div>'
          +'<div class="chg" style="color:'+(isUp?"#ef4444":"#22c55e")+'">'+(isUp?"▲":"▼")+' '+Math.abs(s.chg).toFixed(1)+'%</div>'
          +'<button class="thsbtn" onclick="event.stopPropagation();go('+i+')">📱 同花顺</button>'
        +'</div>'
      +'</div>'
      +'<div class="sigrow"><div class="sigbars">'+bars+'</div>'
        +'<div class="badges">'
          +'<span class="rbadge" style="background:'+rc+'20;color:'+rc+';border:1px solid '+rc+'40">'+RL[s.risk]+'</span>'
          +'<span style="color:#64748b;font-size:12px">量比 '+s.vol.toFixed(1)+'x</span>'
        +'</div>'
      +'</div>'
      +'<div class="catalyst">💡 '+s.cat+'</div>'
      +'<div class="detail" id="d'+i+'">'
        +'<div class="sigtags">'+tags+'</div>'
        +'<div class="stats">'
          +'<div><div class="slabel">目标价</div><div class="sval" style="color:#ef4444">¥'+s.tp.toFixed(2)+'</div></div>'
          +'<div><div class="slabel">止损价</div><div class="sval" style="color:#22c55e">¥'+s.sl.toFixed(2)+'</div></div>'
          +'<div><div class="slabel">信号强度</div><div class="sval" style="color:#fbbf24">'+s.sig+'/10</div></div>'
        +'</div>'
        +'<div class="btnrow">'
          +'<button class="cbtn" onclick="event.stopPropagation();cp(this,\''+s.code+'\')">📋 复制代码</button>'
          +'<button class="thsbtn2" onclick="event.stopPropagation();go('+i+')">📱 同花顺查看完整行情 →</button>'
        +'</div>'
      +'</div>'
    +'</div>';
  }
  document.getElementById("cards").innerHTML=html;
  document.getElementById("cl").innerHTML="共 "+stocks.length+" 支 · 点击展开详情";
  setTimeout(function(){
    document.querySelectorAll(".card").forEach(function(c,i){
      setTimeout(function(){c.classList.add("vis");},i*60);
    });
  },30);
}

function tog(i){document.getElementById("d"+i).classList.toggle("open");}
function setFilter(v,btn){
  curFilter=v;
  document.querySelectorAll(".fbtn").forEach(function(b){b.classList.remove("on");});
  btn.classList.add("on");
  doRefresh();
}
function setSort(v){curSort=v;renderCards();}
function go(i){if(URLS[i])window.open(URLS[i],"_blank");}
function cp(btn,code){
  if(navigator.clipboard){
    navigator.clipboard.writeText(code).then(function(){btn.textContent="✅ 已复制";setTimeout(function(){btn.textContent="📋 复制代码";},2000);});
  } else {
    var ta=document.createElement("textarea");ta.value=code;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
    btn.textContent="✅ 已复制";setTimeout(function(){btn.textContent="📋 复制代码";},2000);
  }
}

function doRefresh(){
  batch++;
  var data=generate(batch);
  allStocks=data.stocks;
  var sent=data.sent;
  document.getElementById("sdot").style.cssText="width:8px;height:8px;border-radius:50%;display:inline-block;background:"+sent.c+";box-shadow:0 0 8px "+sent.c;
  document.getElementById("slabel").style.color=sent.c;
  document.getElementById("slabel").textContent=sent.l;
  document.getElementById("snote").textContent=sent.n;
  var now=new Date();
  document.getElementById("cr").textContent=data.date+" · 第"+batch+"批";
  renderCards();
}

doRefresh();
</script>
</body>
</html>
